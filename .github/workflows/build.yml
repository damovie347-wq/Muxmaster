name: Build Release APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: JDK 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK kur
        uses: android-actions/setup-android@v3

      - name: Gerekli SDK platform/build-tools paketlerini indir
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Gradle kur (wrapper jar projede olmadığı için)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5

      - name: mkvmerge/mkvextract (MKVToolNix) binary'lerini indir ve jniLibs'e göm
        run: |
          sudo apt-get update -y
          sudo apt-get install -y binutils zstd xz-utils patchelf
          python3 scripts/fetch_mkvtoolnix_assets.py

      - name: Release APK derle (minify açık, ffmpeg-kit + mkvtoolnix native dosyaları dahil)
        run: gradle assembleRelease --no-daemon

      - name: APK'yı indirilebilir artifact olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: muxmaster-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
